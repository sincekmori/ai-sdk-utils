version: 2
updates:
  # npm dependencies across the workspace, plus the pinned pnpm in
  # `packageManager`. Grouped into a single weekly PR to keep noise low.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Only propose versions at least 7 days old. Also keeps proposals clear of
    # pnpm 11's default minimumReleaseAge (24h) supply-chain check in CI.
    # Note: security updates ignore the cooldown by design.
    cooldown:
      default-days: 7
    groups:
      npm:
        patterns: ["*"]

  # GitHub Actions used by the CI / release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]
