name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Version Packages PR / tags
      pull-requests: write # open the Version Packages PR
      id-token: write # OIDC trusted publishing to npm (no NPM_TOKEN)
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing requires npm >= 11.5.1, but stay on major 11:
      # npm 12 changed the `npm info --json` output to an array, which
      # @changesets/cli (<= 2.31.0) misreads as "never published" and then
      # crashes on the resulting E403 republish attempts.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@11

      - run: pnpm install --frozen-lockfile

      - name: Build (incl. publint + attw)
        run: pnpm build

      - name: Create Version PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
