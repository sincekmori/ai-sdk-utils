name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Version Packages PR / tags
      pull-requests: write # open the Version Packages PR
      id-token: write # OIDC trusted publishing to npm (no NPM_TOKEN)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing requires npm >= 11.5.1; the version bundled with
      # setup-node is older and would fail with E404 on publish.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build (incl. publint + attw)
        run: pnpm build

      - name: Create Version PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm version
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
