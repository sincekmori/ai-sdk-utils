# Single source of truth for providers, models, and role assignments.
# Loaded and validated at startup.
#
# A provider resolves in one of three ways:
#   - direct   -> a bundled @ai-sdk/* vendor used straight (the default).
#   - gateway  -> add a `gateway` block and tag each model with a `backend`.
#   - resolver -> wired in code via createCatalog(config, { resolvers }).
# They all coexist; roles address any of them by { provider, model }.

providers:
  # --- A direct vendor: @ai-sdk/openai, called straight --------------------
  # `vendor` defaults to `id`, so this is @ai-sdk/openai using OPENAI_API_KEY.
  # Add `baseURL` / `apiKey` / `apiKeyEnvVarName` to point elsewhere.
  - id: openai
    settings: # provider-level defaults, inherited by every model
      temperature: 0.7
    models:
      - id: gpt-5.1
      - id: gpt-5.1-mini
        settings:
          temperature: 0.2

  # --- A direct vendor with a custom id and endpoint -----------------------
  - id: anthropic
    models:
      - id: claude-sonnet-4-5
        settings: { temperature: 1 }

  # --- A special provider behind your own gateway --------------------------
  # The `gateway` block is the topology: where the gateway lives and how each
  # upstream backend is laid out on it. Each model names the `backend` that
  # serves it (and an optional `slug` path override).
  - id: acme
    gateway:
      baseURL: https://gateway.example.com/v1
      apiKeyEnvVarName: ACME_API_KEY # defaults to AI_GATEWAY_API_KEY
      backends:
        anthropic:
          pathTemplate: "anthropic/{slug}"
        google:
          pathTemplate: "google/{slug}:{action}"
          actionMap:
            streamGenerateContent: customStreamGenerateContent
    models:
      - id: claude-opus-4-6
        backend: anthropic
      - id: gemini-2.5-pro
        backend: google
        slug: pro

# role -> { provider, model }. Each pair must exist above (validated at load).
roles:
  chat:
    provider: anthropic
    model: claude-sonnet-4-5
  search:
    provider: acme
    model: gemini-2.5-pro
  summarize:
    provider: openai
    model: gpt-5.1-mini
