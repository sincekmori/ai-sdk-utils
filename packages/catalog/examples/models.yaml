# Single source of truth for providers, models, and role assignments.
# Loaded and validated at startup.

providers:
  - id: openai
    # Provider-level default settings, inherited by every model below.
    # A model's own `settings` are merged on top (model wins).
    settings:
      temperature: 0.7
      maxOutputTokens: 128000
      providerOptions:
        openai:
          reasoningEffort: low
    models:
      # type: default -> resolved as openai("gpt-5.1"). Inherits the provider
      # defaults as-is.
      - id: gpt-5.1
        type: default
      # Overrides temperature; merges providerOptions (keeps reasoningEffort:
      # low, adds parallelToolCalls). maxOutputTokens stays inherited.
      - id: gpt-5.1-mini
        type: default
        settings:
          temperature: 0.2
          providerOptions:
            openai:
              parallelToolCalls: false

  - id: anthropic
    models:
      - id: claude-sonnet-4-5
        type: default
        settings:
          temperature: 1
      - id: claude-haiku-4-5
        type: default

  # Local models served by Ollama's OpenAI-compatible endpoint. That endpoint
  # only speaks the chat-completions API, so these use type: chat -> the
  # resolver calls provider.chat(modelId) instead of provider(modelId).
  - id: ollama
    models:
      - id: qwen3.6:35b
        type: chat
        settings:
          temperature: 0.2

# role -> { provider, model }. Each pair must exist above (validated at load).
roles:
  chat:
    provider: anthropic
    model: claude-sonnet-4-5
  fast:
    provider: anthropic
    model: claude-haiku-4-5
  summarize:
    provider: openai
    model: gpt-5.1-mini
  local:
    provider: ollama
    model: "qwen3.6:35b"
