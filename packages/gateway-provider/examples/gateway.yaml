# Example gateway topology. Replace the URL, paths, action names, and model ids
# with your own. This file documents the SHAPE only — it contains no real
# endpoints. Keep your real topology in a private config, not in source control.

baseURL: https://gateway.example.com/v1

# How each upstream backend is laid out on your gateway. `{slug}` is replaced
# per request with a model's `slug` (or its `id` when `slug` is omitted).
# Every backend except `google` carries the model in the request body.
backends:
  anthropic:
    pathTemplate: "anthropic/{slug}"
  openai:
    pathTemplate: "openai/{slug}"
    api: chat # "chat" | "responses" | "completion" (defaults to "chat")
  mistral:
    pathTemplate: "mistral/{slug}"
  cohere:
    pathTemplate: "cohere/{slug}"
  groq:
    pathTemplate: "groq/{slug}"
  xai:
    pathTemplate: "xai/{slug}"
  deepseek:
    pathTemplate: "deepseek/{slug}"
  perplexity:
    pathTemplate: "perplexity/{slug}"
  # Generic OpenAI-compatible backend: covers Fireworks, Together, Cerebras,
  # DeepInfra, Ollama, and any other OpenAI-spec endpoint. Distinguish them by
  # model `slug`.
  openai-compatible:
    pathTemplate: "compat/{slug}"
    name: gateway # provider name used for metadata namespacing
  google:
    # `{action}` is the Gemini method, e.g. generateContent / streamGenerateContent.
    pathTemplate: "google/{slug}:{action}"
    # Rename methods if your gateway uses different action names — this is how
    # you absorb Gemini's stream / non-stream endpoint switch.
    actionMap:
      streamGenerateContent: customStreamGenerateContent

# The models your gateway serves, each mapped to a backend. `slug` overrides the
# path segment when the gateway endpoint differs from the model id.
models:
  - id: claude-sonnet-4-6
    backend: anthropic
  - id: gpt-5.1
    backend: openai
  - id: mistral-large-latest
    backend: mistral
  - id: moonshotai/kimi-k2
    backend: groq
  - id: grok-4
    backend: xai
  - id: llama-3.3-70b # served by an OpenAI-compatible upstream
    backend: openai-compatible
  - id: gemini-2.5-pro
    backend: google
    slug: pro
